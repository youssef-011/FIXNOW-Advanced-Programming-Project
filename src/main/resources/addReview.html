<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="page">
    <div id="nav"></div>
    <div class="auth-shell" style="max-width: 700px;">
        <div class="hero">
            <h1>Add review</h1>
            <div class="muted">Leave feedback for a technician by ID.</div>
        </div>
        <div id="flash" class="flash"></div>
        <form id="reviewForm">
            <div class="field">
                <label for="technicianId">Technician ID</label>
                <input id="technicianId" type="number" required>
            </div>
            <div class="field">
                <label for="rating">Rating</label>
                <select id="rating" required>
                    <option value="5">5</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                </select>
            </div>
            <div class="field">
                <label for="comment">Comment</label>
                <textarea id="comment" required></textarea>
            </div>
            <div class="actions">
                <button type="submit">Submit review</button>
                <a class="button secondary" href="/customerDashboard.html">Back</a>
            </div>
        </form>
    </div>
</div>
<script src="/app.js"></script>
<script>
    const user = requireUser(["CUSTOMER"]);
    document.getElementById("nav").innerHTML = navMarkup(user);

    document.getElementById("reviewForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        clearFlash("flash");
        try {
            await apiFetch("/api/customer/reviews", {
                method: "POST",
                body: JSON.stringify({
                    userId: user.id,
                    technicianId: Number(document.getElementById("technicianId").value),
                    rating: Number(document.getElementById("rating").value),
                    comment: document.getElementById("comment").value.trim()
                })
            });
            showFlash("flash", "Review submitted.", "success");
            document.getElementById("reviewForm").reset();
        } catch (error) {
            showFlash("flash", error.message);
        }
    });
</script>
</body>
</html>
