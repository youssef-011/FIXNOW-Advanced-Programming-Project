<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXNOW Admin Dashboard</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="page">
    <div id="nav"></div>
    <div class="grid two">
        <section class="panel">
            <div class="hero">
                <h1>Admin dashboard</h1>
                <div class="muted">Review every request and assign available technicians.</div>
            </div>
            <div id="flash" class="flash"></div>
            <div id="requests" class="list"></div>
        </section>
        <section class="panel">
            <div class="hero">
                <h2>Available technicians</h2>
                <div class="muted">Use these IDs when assigning requests.</div>
            </div>
            <div id="techs" class="list"></div>
        </section>
    </div>
</div>
<script src="/app.js"></script>
<script>
    const user = requireUser(["ADMIN"]);
    document.getElementById("nav").innerHTML = navMarkup(user);

    async function loadDashboard() {
        clearFlash("flash");
        try {
            const [requests, technicians] = await Promise.all([
                apiFetch("/api/admin/requests"),
                apiFetch("/api/admin/technicians/available")
            ]);

            const requestContainer = document.getElementById("requests");
            requestContainer.innerHTML = requests.length ? requests.map((request) => `
                <div class="item">
                    <div class="item-head">
                        <strong>Request #${request.id}</strong>
                        <span class="badge">${escapeHtml(request.status || "")}</span>
                    </div>
                    <div>${escapeHtml(request.description || "")}</div>
                    <div class="muted" style="margin: 10px 0;">Customer ID: ${request.userId ?? "N/A"} | Technician ID: ${request.technicianId ?? "Unassigned"}</div>
                    <form class="inline-form" onsubmit="assignRequest(event, ${request.id})">
                        <input name="technicianId" type="number" placeholder="Technician ID" required>
                        <button type="submit">Assign</button>
                    </form>
                </div>
            `).join("") : '<div class="empty">No requests found.</div>';

            const techContainer = document.getElementById("techs");
            techContainer.innerHTML = technicians.length ? technicians.map((tech) => `
                <div class="item">
                    <div class="item-head">
                        <strong>${escapeHtml(tech.name || "Technician")}</strong>
                        <span class="badge">ID ${tech.id}</span>
                    </div>
                    <div>Skill: ${escapeHtml(tech.skill || "N/A")}</div>
                    <div class="muted" style="margin-top: 8px;">Rating: ${tech.rating ?? 0} | Available: ${tech.available}</div>
                </div>
            `).join("") : '<div class="empty">No available technicians.</div>';
        } catch (error) {
            showFlash("flash", error.message);
        }
    }

    async function assignRequest(event, requestId) {
        event.preventDefault();
        clearFlash("flash");
        const technicianId = event.target.technicianId.value;
        try {
            await apiFetch(`/api/admin/requests/${requestId}/assign/${technicianId}`, { method: "POST" });
            showFlash("flash", "Technician assigned successfully.", "success");
            loadDashboard();
        } catch (error) {
            showFlash("flash", error.message);
        }
    }

    loadDashboard();
</script>
</body>
</html>
