<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXNOW Login</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="page">
    <div class="auth-shell">
        <div class="hero">
            <h1>Welcome back</h1>
            <div class="muted">Log in and jump straight into requests, assignments, and reviews.</div>
        </div>
        <div id="flash" class="flash"></div>
        <form id="loginForm">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" required>
            </div>
            <div class="actions">
                <button type="submit">Login</button>
                <a class="button secondary" href="/register.html">Create account</a>
            </div>
        </form>
    </div>
</div>
<script src="/app.js"></script>
<script>
    const currentUser = getCurrentUser();
    if (currentUser) {
        window.location.href = dashboardForRole(currentUser.role);
    }

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        clearFlash("flash");
        try {
            const user = await apiFetch("/api/auth/login", {
                method: "POST",
                body: JSON.stringify({
                    email: document.getElementById("email").value.trim(),
                    password: document.getElementById("password").value
                })
            });
            saveCurrentUser(user);
            window.location.href = dashboardForRole(user.role);
        } catch (error) {
            showFlash("flash", error.message);
        }
    });
</script>
</body>
</html>
